<body>

  <!-- Profile Section -->
  <div id="profile">
    <h2>My Profile</h2>
    <p>Total Solved: <span id="totalSolved">0</span></p>
    <p>Easy: <span id="easyCount">0</span></p>
    <p>Medium: <span id="mediumCount">0</span></p>
    <p>Hard: <span id="hardCount">0</span></p>
  </div>

  <!-- Problem Section -->
  <div id="problems">
    <h2>Problems</h2>
    <input autofocus autocomplete = "off" type = "text" placeholder="enter the problem name" id="problemName">
    <select id = "difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <button id = "addProblem">Add Problem</button>

    <ul id="problemList">
      <!-- Problems will be added here -->
    </ul>   
    </div>
      
    <script src="script.js"></script>
    
  
    

</body>
